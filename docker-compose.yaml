# One-command local stack: Postgres + Redis + API + web (nginx).
#   docker compose up --build   →   open http://localhost:8080
#
# This is fully self-contained and does NOT use Neon/Upstash — it spins up its
# own Postgres and Redis so the whole app runs offline on any machine.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: release_checklist
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d release_checklist']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://app:app@postgres:5432/release_checklist?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: http://localhost:8080
      CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: '' # same-origin; nginx proxies /api to the api service
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  pgdata:
